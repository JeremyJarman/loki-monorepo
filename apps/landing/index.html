<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LOKI - Discover what's happening tonight. Find local venues, events, and specials. Share with friends. Make plans together." />
    <meta name="keywords" content="local venues, events, dining, social planning, experience sharing, LOKI" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LOKI - Experience Sharing Starts Here" />
    <meta property="og:description" content="Discover what's happening tonight. Find local venues, events, and specials. Share with friends. Make plans together." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="LOKI - Experience Sharing Starts Here" />
    <meta property="twitter:description" content="Discover what's happening tonight. Find local venues, events, and specials." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <title>LOKI - Experience Sharing Starts Here</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LOKI",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.5",
        "ratingCount": "100"
      },
      "description": "LOKI is the world's first Experience Sharing network. Discover local venues, events, and specials. Share with friends. Make plans together.",
      "screenshot": "https://loki.app/screenshot.jpg"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
